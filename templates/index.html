<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="noise"></div>
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>

    <div class="container">
        <header class="header">
            <div class="header-badge">▶ TÉLÉCHARGEUR VIDÉO</div>
            <h1>YouTube<br><span class="accent">Downloader</span></h1>
            <p class="subtitle">Qualité HD · Téléchargement direct · Gratuit</p>
        </header>

        <main class="main-content">

            <!-- URL Input -->
            <section class="card input-card">
                <div class="card-label">01 — URL</div>
                <div class="input-group">
                    <div class="input-wrapper">
                        <span class="input-icon">⟶</span>
                        <input
                            type="text"
                            id="urlInput"
                            placeholder="Collez votre lien YouTube ici..."
                            class="url-input"
                            autocomplete="off"
                        >
                        <button class="clear-btn" id="clearBtn" title="Effacer">✕</button>
                    </div>
                    <button id="fetchBtn" class="btn btn-fetch">
                        <span class="btn-text">Analyser</span>
                        <span class="btn-icon">↗</span>
                    </button>
                </div>
                <div id="errorMessage" class="error-message"></div>

                <div id="loadingSpinner" class="loading-area" style="display:none;">
                    <div class="loading-bar"><div class="loading-fill"></div></div>
                    <span class="loading-label">Analyse en cours…</span>
                </div>
            </section>

            <!-- Video Info + Format Selection -->
            <section id="videoSection" class="card video-card" style="display:none;">
                <div class="card-label">02 — VIDÉO</div>

                <div class="video-info">
                    <div class="thumbnail-wrap">
                        <img id="thumbnail" src="" alt="Thumbnail" class="thumbnail">
                        <div class="thumb-overlay">
                            <span class="play-icon">▶</span>
                        </div>
                    </div>
                    <div class="video-meta">
                        <h2 id="videoTitle" class="video-title"></h2>
                        <div class="meta-row">
                            <span id="videoDuration" class="meta-chip">⏱ --:--</span>
                            <span id="videoChannel" class="meta-chip">📺 —</span>
                        </div>
                    </div>
                </div>

                <!-- Quality Selector -->
                <div class="quality-section">
                    <div class="card-label">03 — QUALITÉ</div>
                    <div id="formatsList" class="formats-grid"></div>
                </div>

                <!-- Download CTA -->
                <div id="downloadArea" class="download-area" style="display:none;">
                    <div id="progressContainer" class="progress-wrap" style="display:none;">
                        <div class="progress-header">
                            <span id="progressLabel" class="progress-label">Téléchargement…</span>
                            <span id="progressPercent" class="progress-pct">0%</span>
                        </div>
                        <div class="progress-track">
                            <div id="progressFill" class="progress-fill"></div>
                        </div>
                        <div id="progressDetail" class="progress-detail"></div>
                    </div>

                    <button id="downloadBtn" class="btn btn-download">
                        <span class="btn-text">⬇ Télécharger</span>
                        <span class="btn-sub" id="downloadBtnSub">Sauvegarder dans Téléchargements</span>
                    </button>

                    <div id="downloadStatus" class="status-message" style="display:none;"></div>
                </div>
            </section>

        </main>

        <footer class="footer">
            <span>Usage personnel uniquement · Respectez les droits d'auteur</span>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
